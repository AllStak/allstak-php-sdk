name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Tag & notify Packagist
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release needs to write a Release object against
      # the tag — without this the step 403s ("Resource not accessible by
      # integration") even though the tag push has already triggered the
      # workflow. Packagist's auto-webhook still receives the tag push, so
      # earlier runs published the package even when this step failed; the
      # fix here just makes the GH-side Release object materialize too.
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpunit --colors=always

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Notify Packagist
        if: env.PACKAGIST_USER != ''
        env:
          PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          PKG=$(php -r 'echo json_decode(file_get_contents("composer.json"))->name;')
          curl -fsSL -XPOST \
            -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USER}&apiToken=${PACKAGIST_TOKEN}" \
            -d "{\"repository\":{\"url\":\"https://packagist.org/packages/${PKG}\"}}"
