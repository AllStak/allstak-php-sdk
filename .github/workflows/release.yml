name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Tag & notify Packagist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpunit --colors=always

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Notify Packagist
        if: env.PACKAGIST_USER != ''
        env:
          PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          PKG=$(php -r 'echo json_decode(file_get_contents("composer.json"))->name;')
          curl -fsSL -XPOST \
            -H 'content-type:application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USER}&apiToken=${PACKAGIST_TOKEN}" \
            -d "{\"repository\":{\"url\":\"https://packagist.org/packages/${PKG}\"}}"
